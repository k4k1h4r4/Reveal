<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #ffffff;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background image layer ── */
#bg {
  position: fixed;
  inset: 0;
  background: url('images/Lacie.jpg') center center / cover no-repeat;
  opacity: 0;
  transition: opacity 3s ease;
  z-index: 0;
}

#bg.visible {
  opacity: 1;
}

/* ── Phrase at top ── */
#phrase {
  position: fixed;
  top: clamp(24px, 7vh, 52px);
  left: 0;
  right: 0;
  padding: 0 20px;
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 9vw, 52px);
  letter-spacing: 0.06em;
  line-height: 1.25;
  color: #111111;
  pointer-events: none;
  z-index: 10;
  transition: color 2.5s ease, text-shadow 2.5s ease;
}

#phrase.lit {
  color: #ffffff;
  text-shadow:
    0 2px 6px rgba(0,0,0,0.55),
    0 4px 24px rgba(0,0,0,0.4);
}

.char {
  display: inline;
  opacity: 0;
  transition: opacity 0.45s ease;
}

.char.shown {
  opacity: 1;
}

/* ── The single active blinking letter ── */
#active-letter {
  position: fixed;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 24vw, 130px);
  color: #111111;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transform: translate(-50%, -50%);
  left: 50%;
  top: 50%;
  z-index: 20;
  animation: slowblink 2s ease-in-out infinite;
  will-change: opacity;
}

#active-letter.hidden {
  display: none;
}

@keyframes slowblink {
  0%,  100% { opacity: 1;    }
  48%        { opacity: 1;    }
  50%        { opacity: 0.04; }
  52%        { opacity: 0.04; }
}

</style>
</head>
<body>

<div id="bg"></div>
<div id="phrase"></div>
<div id="active-letter">L</div>

<script>
// ── Config ──────────────────────────────────────────────
const PHRASE = "YOU ARE BEAUTIFUL\nAND I LOVE YOU.";

// ── Build phrase DOM ─────────────────────────────────────
const phraseEl   = document.getElementById('phrase');
const letterEl   = document.getElementById('active-letter');
const bgEl       = document.getElementById('bg');

const allChars = [];   // { el, char, flatIdx }
let lineDiv = document.createElement('div');
phraseEl.appendChild(lineDiv);

PHRASE.split('').forEach((ch, i) => {
  if (ch === '\n') {
    lineDiv = document.createElement('div');
    phraseEl.appendChild(lineDiv);
    return;
  }
  const span = document.createElement('span');
  span.className = 'char';
  span.textContent = (ch === ' ') ? '\u00A0' : ch;
  lineDiv.appendChild(span);
  allChars.push({ el: span, char: ch, flatIdx: i });
});

// Only non-space characters need a tap
const tappable = allChars.filter(c => c.char !== ' ');

// ── State ────────────────────────────────────────────────
let tapIndex = 0;     // which tappable char is currently active
let started  = false; // has the user tapped the initial "L"

// ── Helpers ──────────────────────────────────────────────
function randomPos() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  // Keep clear of the phrase zone at top (~22% of screen)
  const xMin = W * 0.14,  xMax = W * 0.86;
  const yMin = H * 0.30,  yMax = H * 0.84;
  return {
    x: xMin + Math.random() * (xMax - xMin),
    y: yMin + Math.random() * (yMax - yMin)
  };
}

function showActive(char, x, y) {
  letterEl.textContent = char;
  letterEl.style.left  = x + 'px';
  letterEl.style.top   = y + 'px';
  // Restart the blink animation cleanly
  letterEl.style.animation = 'none';
  void letterEl.offsetWidth; // reflow
  letterEl.style.animation = '';
}

// Reveal every character up to (and including) the given flatIdx
function revealThrough(flatIdx) {
  allChars.forEach(c => {
    if (c.flatIdx <= flatIdx) c.el.classList.add('shown');
  });
}

// ── Main tap handler ─────────────────────────────────────
function onTap(e) {
  e.preventDefault();

  if (!started) {
    // First tap — start the sequence
    started = true;
    const pos = randomPos();
    showActive(tappable[0].char, pos.x, pos.y);
    return;
  }

  // Reveal tapped character (and any preceding spaces)
  revealThrough(tappable[tapIndex].flatIdx);
  tapIndex++;

  if (tapIndex >= tappable.length) {
    // All letters revealed — show the photo
    letterEl.classList.add('hidden');
    setTimeout(() => {
      bgEl.classList.add('visible');
      phraseEl.classList.add('lit');
    }, 350);
    return;
  }

  // Move to the next letter at a new random spot
  const pos = randomPos();
  showActive(tappable[tapIndex].char, pos.x, pos.y);
}

// ── Event listeners ──────────────────────────────────────
letterEl.addEventListener('touchend', onTap, { passive: false });
letterEl.addEventListener('click',    onTap);

</script>
</body>
</html>
